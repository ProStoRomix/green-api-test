<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Green API DevOps Test</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px 15px;
margin-right:10px;
cursor:pointer;
}

textarea{
width:100%;
height:200px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Green API Test Interface</h2>

<label>ID Instance</label>
<input id="idInstance" value="">

<label>API Token</label>
<input id="apiToken" value="">

<button onclick="getSettings()">getSettings</button>
<button onclick="getState()">getStateInstance</button>

<hr>

<label>Phone</label>
<input id="phone" placeholder="79001234567@c.us">

<label>Message</label>
<input id="message">

<button onclick="sendMessage()">Send Message</button>

<hr>

<label>File URL</label>
<input id="fileUrl">

<button onclick="sendFile()">Send File</button>

<textarea id="result"></textarea>

</div>

<script src="script.js"></script>

</body>
</html>
